---
- name: Automate Talos Omni On-Prem Installation (Basic Auth)
  hosts: all
  become: true # Ensures permissions to write files and manage Docker
  
  vars:
    omni_version: "1.4.6"
    omni_domain: "omni.romeobag.ai"
    omni_admin_email: "romayojr+omni@gmail.com"
    
    # Using user's home directory as requested
    omni_work_dir: "/home/romeo/omni"
    omni_env_file: "{{ omni_work_dir }}/omni.env"
    omni_compose_file: "{{ omni_work_dir }}/compose.yaml"
    
    tls_cert_path: "/etc/letsencrypt/live/{{ omni_domain }}/fullchain.pem"
    tls_key_path: "/etc/letsencrypt/live/{{ omni_domain }}/privkey.pem"
    etcd_encryption_key: "{{ omni_work_dir }}/omni.asc"

  tasks:
    - name: Install required system packages
      ansible.builtin.package:
        name:
          - gpg
          - uuid-runtime # For uuidgen
          - python3-docker
        state: present
      when: ansible_facts["os_family"] == "Debian"

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Generate Let's Encrypt certificates
      community.general.certbot:
        certbot: /usr/bin/certbot
        cert_name: "{{ omni_domain }}"
        email: "{{ omni_admin_email }}"
        agree_terms: true
        validate_certs: false
        auth: standalone

    - name: Generate UUID for Omni account
      ansible.builtin.command: uuidgen
      register: omni_uuid

    - name: Generate GPG key for etcd encryption (no passphrase)
      ansible.builtin.command: >
        gpg --batch --gen-key <<EOF
        %no-protection
        Key-Type: RSA
        Key-Length: 4096
        Name-Real: Omni etcd encryption
        Name-Email: omni@localhost
        Expire-Date: 0
        %commit
        EOF
      args:
        creates: "{{ omni_work_dir }}/.gpg_key_generated"
      register: gpg_gen

    - name: Mark GPG key generation as complete
      ansible.builtin.copy:
        content: "done"
        dest: "{{ omni_work_dir }}/.gpg_key_generated"
      when: gpg_gen is changed

    - name: Export GPG secret key to omni.asc
      ansible.builtin.shell: >
        gpg --export-secret-keys --armor
        $(gpg --list-secret-keys --keyid-format LONG | grep sec -A1 | grep -oE '[A-F0-9]{40}')
        > {{ etcd_encryption_key }}
      args:
        creates: "{{ etcd_encryption_key }}"

    # --- Directory & File Generation (Using 'copy' to avoid remote file download bugs) ---

    - name: Ensure Omni working directory exists
      ansible.builtin.file:
        path: "{{ omni_work_dir }}"
        state: directory
        mode: '0755'

    - name: Generate omni.env configuration
      ansible.builtin.copy:
        dest: "{{ omni_env_file }}"
        content: |
          # Omni
          OMNI_IMG_TAG={{ omni_version }}
          OMNI_ACCOUNT_UUID={{ omni_uuid.stdout }}
          NAME=omni
          EVENT_SINK_PORT=8091

          SQLITE_STORAGE_PATH=/_out/sqlite/omni.sqlite.db

          ## Keys and Certs
          TLS_CERT={{ tls_cert_path }}
          TLS_KEY={{ tls_key_path }}
          ETCD_VOLUME_PATH=/etc/etcd
          ETCD_ENCRYPTION_KEY={{ etcd_encryption_key }}

          ## Binding
          BIND_ADDR=0.0.0.0:443
          MACHINE_API_BIND_ADDR=0.0.0.0:8090
          K8S_PROXY_BIND_ADDR=0.0.0.0:8100

          ## Domains and Advertisements
          OMNI_DOMAIN_NAME={{ omni_domain }}
          ADVERTISED_API_URL=https://{{ omni_domain }}
          SIDEROLINK_ADVERTISED_API_URL=https://{{ omni_domain }}:8090/
          ADVERTISED_K8S_PROXY_URL=https://{{ omni_domain }}:8100/
          SIDEROLINK_WIREGUARD_ADVERTISED_ADDR={{ omni_domain }}:50180

          ## Users
          INITIAL_USER_EMAILS={{ omni_admin_email }}

          ## Authentication
          AUTH=--auth-basic-enabled=true
        mode: '0644'
      notify: Remove deployment marker

    - name: Generate compose.yaml configuration
      ansible.builtin.copy:
        dest: "{{ omni_compose_file }}"
        content: |
          name: omni-on-prem
          services:
            omni:
              container_name: omni
              image: ghcr.io/siderolabs/omni:${OMNI_IMG_TAG}
              network_mode: host
              devices:
                - /dev/net/tun
              cap_add:
                - NET_ADMIN
              volumes:
                - ${ETCD_VOLUME_PATH}:/_out/etcd
                - {{ omni_work_dir }}/sqlite:/_out/sqlite
                - ${ETCD_ENCRYPTION_KEY}:/omni.asc
                - ${TLS_CERT}:/tls.crt
                - ${TLS_KEY}:/tls.key
              command: >
                --account-id=${OMNI_ACCOUNT_UUID}
                --name=${NAME}
                --sqlite-storage-path=${SQLITE_STORAGE_PATH}
                --cert=/tls.crt
                --key=/tls.key
                --machine-api-cert=/tls.crt
                --machine-api-key=/tls.key
                --private-key-source=file:///omni.asc
                --event-sink-port=${EVENT_SINK_PORT}
                --bind-addr=${BIND_ADDR}
                --machine-api-bind-addr=${MACHINE_API_BIND_ADDR}
                --k8s-proxy-bind-addr=${K8S_PROXY_BIND_ADDR}
                --advertised-api-url=${ADVERTISED_API_URL}
                --advertised-kubernetes-proxy-url=${ADVERTISED_K8S_PROXY_URL}
                --siderolink-api-advertised-url=${SIDEROLINK_ADVERTISED_API_URL}
                --siderolink-wireguard-advertised-addr=${SIDEROLINK_WIREGUARD_ADVERTISED_ADDR}
                --initial-users=${INITIAL_USER_EMAILS}
                --auth-basic-enabled=true
              restart: always

    # --- Deployment via Shell (More reliable across Ansible versions) ---
    
    - name: Deploy Omni stack via Docker Compose
      ansible.builtin.shell: |
        cd {{ omni_work_dir }} && docker compose --env-file {{ omni_env_file }} up -d
      args:
        creates: "{{ omni_work_dir }}/.deployed"

  handlers:
    # This block defines the cleaning task that was previously missing!
    - name: Remove deployment marker if new config is written
      ansible.builtin.file:
        path: "{{ omni_work_dir }}/.deployed"
        state: absent
